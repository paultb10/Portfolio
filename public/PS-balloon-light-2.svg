      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0055bb" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0055bb" stop-opacity="0"/>
    </radialGradient>
    <filter id="rim">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#0077cc" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clipP"><use href="#lP"/></clipPath>
    <clipPath id="clipS"><use href="#lS"/></clipPath>
  </defs>


  <!-- Shadows -->
  <ellipse cx="148" cy="252" rx="108" ry="11" fill="url(#shadowGrad)"/>
  <ellipse cx="358" cy="252" rx="108" ry="11" fill="url(#shadowGrad)"/>

