<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 270" width="500" height="270">
  <defs>
    <radialGradient id="ballP" cx="38%" cy="30%" r="68%" fx="30%" fy="22%">
      <stop offset="0%"   stop-color="#e0f4ff"/>
      <stop offset="18%"  stop-color="#80ccff"/>
      <stop offset="50%"  stop-color="#0077dd"/>
      <stop offset="78%"  stop-color="#004499"/>
      <stop offset="100%" stop-color="#002266"/>
    </radialGradient>
    <radialGradient id="ballS" cx="38%" cy="30%" r="68%" fx="30%" fy="22%">
      <stop offset="0%"   stop-color="#e0f4ff"/>
      <stop offset="18%"  stop-color="#80ccff"/>
      <stop offset="50%"  stop-color="#0077dd"/>
      <stop offset="78%"  stop-color="#004499"/>
      <stop offset="100%" stop-color="#002266"/>
    </radialGradient>
    <radialGradient id="specP" cx="32%" cy="24%" r="38%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="55%"  stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="specS" cx="32%" cy="24%" r="38%">
